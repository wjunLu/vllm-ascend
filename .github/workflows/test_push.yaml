name: Test Push

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup git
        run: |
          git config user.name "test-bot"
          git config user.email "test@bot.com"

      - name: Create test branch
        run: |
          BRANCH="test-push-$(date +%s)"
          git checkout -b "$BRANCH"
          date >> test.txt
          git add test.txt
          git commit -m "test push"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Install deps
        run: pip install -e .

      - name: Test push
        env:
          GITHUB_REPO: wjunLu/vllm-ascend
          HEAD_FORK: wjunLu/vllm-ascend
          PUSH_TO_GITHUB: 'true'
          PR_DRAFT: 'false'
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cat > /tmp/test_push.py << 'PYEOF'
          import os
          from pathlib import Path
          from main2main_flow.scripts.push_to_github import push_and_create_pr

          url = push_and_create_pr(
              ascend_path=Path('.'),
              github_repo=os.environ['GITHUB_REPO'],
              head_fork=os.environ['HEAD_FORK'],
              draft=False,
              branch_name=os.environ['BRANCH'],
          )
          print('PR_URL=' + (url or 'EMPTY'))
          PYEOF
          python3 /tmp/test_push.py 2>&1
